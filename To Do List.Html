<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do App</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#1e3c72,#2a5298);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:600px;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h1{
text-align:center;
color:#2a5298;
margin-bottom:20px;
}

.input-box{
display:flex;
gap:10px;
}

.input-box input{
flex:1;
padding:12px;
border:2px solid #2a5298;
border-radius:10px;
font-size:16px;
}

.input-box button{
padding:12px 20px;
background:#2a5298;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.input-box button:hover{
background:#1e3c72;
}

.filters{
margin:20px 0;
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.filters button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
background:#e9ecef;
font-weight:bold;
}

.filters button:hover{
background:#2a5298;
color:white;
}

ul{
list-style:none;
}

li{
background:#f8f9fa;
margin-top:10px;
padding:12px;
border-left:5px solid #2a5298;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
transition:.3s;
}

li:hover{
transform:translateX(5px);
}

.completed{
text-decoration:line-through;
color:gray;
}

.actions button{
margin-left:5px;
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.done{
background:#28a745;
color:white;
}

.edit{
background:#ffc107;
}

.delete{
background:#dc3545;
color:white;
}

@media(max-width:600px){

.input-box{
flex-direction:column;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:5px;
}
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 To-Do List</h1>

<div class="input-box">
<input type="text" id="taskInput" placeholder="Enter a task...">
<button onclick="addTask()">Add</button>
</div>

<div class="filters">
<button onclick="filterTasks('all')">All</button>
<button onclick="filterTasks('active')">Active</button>
<button onclick="filterTasks('completed')">Completed</button>
</div>

<ul id="taskList"></ul>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let currentFilter = "all";

function saveTasks(){
localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask(){

const input = document.getElementById("taskInput");

if(input.value.trim()==="") return;

tasks.push({
text:input.value,
completed:false
});

input.value="";
saveTasks();
renderTasks();
}

function toggleTask(index){
tasks[index].completed=!tasks[index].completed;
saveTasks();
renderTasks();
}

function editTask(index){

let newText = prompt(
"Edit Task",
tasks[index].text
);

if(newText!==null && newText.trim()!==""){
tasks[index].text=newText;
saveTasks();
renderTasks();
}
}

function deleteTask(index){

if(confirm("Delete this task?")){
tasks.splice(index,1);
saveTasks();
renderTasks();
}
}

function filterTasks(type){
currentFilter=type;
renderTasks();
}

function renderTasks(){

const list=document.getElementById("taskList");
list.innerHTML="";

tasks.forEach((task,index)=>{

if(currentFilter==="active" && task.completed) return;
if(currentFilter==="completed" && !task.completed) return;

const li=document.createElement("li");

li.innerHTML=`
<span class="${task.completed ? 'completed':''}">
${task.text}
</span>

<div class="actions">

<button class="done"
onclick="toggleTask(${index})">
${task.completed ? 'Undo':'Done'}
</button>

<button class="edit"
onclick="editTask(${index})">
Edit
</button>

<button class="delete"
onclick="deleteTask(${index})">
Delete
</button>

</div>
`;

list.appendChild(li);

});
}

renderTasks();

</script>

</body>
</html>
